<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Janeshwaran R – Darkpath</title>
  <meta name="description" content="Game Developer • 3D Artist • Dark Fantasy Author (Darkpath on Webnovel)" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- Comic Font -->
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&family=Luckiest+Guy&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#FFF5E1;            /* aged comic paper */
      --panel:#FFFBF5;
      --accent:#FF4655;        /* classic comic red */
      --accent2:#FFD23F;       /* comic yellow */
      --text:#1E152A;
      --outline:#000;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Comic Neue', cursive;
      background:var(--bg);
      color:var(--text);
      background-image:
        radial-gradient(circle at 20% 80%, rgba(255,70,85,0.15) 0%, transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255,210,63,0.15) 0%, transparent 30%),
        repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,70,85,0.03) 10px, rgba(255,70,85,0.03) 20px);
      overflow-x:hidden;
      cursor:none;
    }

    /* Halftone background effect */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><circle cx="5" cy="5" r="2" fill="%23FF4655" opacity="0.1"/></svg>') repeat;
      pointer-events:none;
      z-index:-1;
    }

    canvas{position:fixed;inset:0;z-index:-2;opacity:0.05;} /* keep subtle */

    #cursor{
      position:fixed;width:60px;height:60px;pointer-events:none;z-index:9999;
      background:radial-gradient(circle, var(--accent) 10%, transparent 70%);
      border:4px solid var(--outline);
      border-radius:50%;
      transform:translate(-50%,-50%);
      box-shadow:0 0 20px var(--accent);
    }

    header{
      position:fixed;top:0;left:0;right:0;z-index:1000;
      background:var(--panel);
      border-bottom:8px solid var(--outline);
      box-shadow:0 10px 0 var(--accent);
      transform:skewY(-2deg);
    }
    header.scrolled{box-shadow:0 15px 0 var(--accent2);}

    nav{
      max-width:1400px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;
      transform:skewY(2deg);
    }
    .logo{
      font-family:'Bangers', cursive;
      font-size:4.5rem;
      color:var(--outline);
      text-shadow:
        4px 4px 0 var(--accent),
        -2px -2px 0 var(--accent2);
      letter-spacing:3px;
    }
    .nav-links a{
      font-family:'Bangers', cursive;
      color:var(--outline);
      text-decoration:none;
      font-size:2rem;
      margin:0 1.5rem;
      position:relative;
      text-shadow:3px 3px 0 var(--accent2);
    }
    .nav-links a::after{
      content:"";
      position:absolute;
      bottom:-10px;left:0;width:100%;height:10px;
      background:var(--accent);
      clip-path: polygon(0 0, 100% 0, 90% 100%, 10% 100%);
      opacity:0;
      transition:0.4s;
    }
    .nav-links a:hover::after,.nav-links a.active::after{opacity:1;}

    main{padding-top:120px;}
    section{
      padding:8rem 2rem;max-width:1400px;margin:auto;
      background:var(--panel);
      margin-bottom:4rem;
      border:8px solid var(--outline);
      box-shadow:20px 20px 0 rgba(0,0,0,0.2);
      clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
      position:relative;
    }
    section::before{
      content:"";
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(135deg, transparent, transparent 8px, rgba(255,70,85,0.07) 8px, rgba(255,70,85,0.07) 16px);
      pointer-events:none;
    }

    h2{
      font-family:'Luckiest Guy', cursive;
      font-size:6rem;
      text-align:center;
      margin-bottom:4rem;
      color:var(--outline);
      text-shadow:
        6px 6px 0 var(--accent),
        -3px -3px 0 var(--accent2);
      transform:rotate(-2deg);
    }

    /* Home */
    #home{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:linear-gradient(45deg, rgba(255,70,85,0.1), rgba(255,210,63,0.1));
    }
    #home h1{
      font-family:'Bangers', cursive;
      font-size:12rem;
      color:var(--outline);
      text-shadow:
        10px 10px 0 var(--accent),
        -5px -5px 0 var(--accent2);
      transform:rotate(-4deg);
    }
    .typewriter{
      font-family:'Bangers', cursive;
      font-size:3.5rem;
      color:var(--outline);
      text-shadow:4px 4px 0 var(--accent2);
      border-right:8px solid var(--accent);
      animation:typing 4s steps(40) forwards,blink 1s infinite;
    }

    /* About */
    .about-grid{
      display:grid;
      grid-template-columns:1fr 2fr;
      gap:4rem;
      align-items:center;
    }
    .about-img{
      border:10px solid var(--outline);
      box-shadow:15px 15px 0 var(--accent);
      transform:rotate(4deg);
    }
    .about-img:hover{transform:rotate(8deg) scale(1.05);}

    /* Cards */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
      gap:3rem;
    }
    .card{
      background:var(--panel);
      border:8px solid var(--outline);
      box-shadow:20px 20px 0 var(--accent);
      transform:rotate(-2deg);
      transition:all 0.5s;
    }
    .card:hover{
      transform:rotate(3deg) translateY(-30px) scale(1.08);
      box-shadow:40px 40px 0 var(--accent2);
      z-index:10;
    }
    .card img{
      width:100%;
      border-bottom:8px solid var(--outline);
    }
    .card-body{
      padding:2.5rem;
      background:linear-gradient(135deg, #fffbf5, #ffefc4);
    }
    .card h3{
      font-family:'Bangers', cursive;
      font-size:2.8rem;
      color:var(--outline);
      text-shadow:4px 4px 0 var(--accent);
    }
    .btn{
      display:inline-block;
      margin-top:2rem;
      padding:1.2rem 3rem;
      background:var(--accent);
      color:white;
      font-family:'Bangers', cursive;
      font-size:2rem;
      border:6px solid var(--outline);
      box-shadow:10px 10px 0 var(--outline);
      transform:rotate(-2deg);
      transition:0.4s;
    }
    .btn:hover{
      transform:rotate(4deg) translateY(-15px);
      box-shadow:20px 20px 0 var(--outline);
    }

    /* Contact */
    .contact-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:2rem;
      margin:4rem 0;
    }
    .contact-item{
      background:var(--panel);
      padding:2rem;
      border:6px solid var(--outline);
      text-align:center;
      transform:rotate(3deg);
      box-shadow:15px 15px 0 var(--accent2);
    }
    .contact-item i{
      font-size:4rem;
      color:var(--accent);
      text-shadow:5px 5px 0 var(--outline);
    }

    form input, form textarea{
      width:100%;
      padding:1.5rem;
      border:6px solid var(--outline);
      background:#fff;
      font-size:1.4rem;
      font-family:'Comic Neue', cursive;
    }
    button{
      font-family:'Bangers', cursive;
      font-size:2.5rem;
      padding:1.5rem 4rem;
      background:var(--accent);
      color:white;
      border:8px solid var(--outline);
      box-shadow:15px 15px 0 var(--outline);
      cursor:pointer;
    }
    button:hover{
      transform:translate(-10px,-10px);
      box-shadow:30px 30px 0 var(--outline);
    }

    @media(max-width:768px){
      #home h1{font-size:7rem;}
      h2{font-size:4.5rem;}
      .about-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
