<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Janeshwaran R – Darkpath</title>
  <meta name="description" content="Game Developer • 3D Artist • Dark Fantasy Author (Darkpath on Webnovel)" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{
      --bg:#0a0e17;
      --card:rgba(15,20,35,0.65);
      --accent:#00ffea;
      --accent2:#ff0066;
      --text:#e0fbfc;
      --gray:#94a3b8;
      --glow-cyan:0 0 60px 80px rgba(0,255,234,0.5);
      --glow-pink:0 0 60px rgba(255,0,102,0.5);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Montserrat,Segoe UI,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
      cursor:none;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(0,255,234,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,0,102,0.12) 0%, transparent 50%);
    }
    canvas{position:fixed;inset:0;z-index:-1;}

    /* Custom Cursor */
    #cursor{
      position:fixed;width:40px;height:40px;pointer-events:none;z-index:9999;
      border:2px solid var(--accent);border-radius:50%;
      background:radial-gradient(circle,var(--accent) 10%,transparent 70%);
      transform:translate(-50%,-50%);mix-blend-mode:screen;
      box-shadow:var(--glow-cyan);
      transition:0.08s;
    }

    header{
      position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.5rem 0;
      backdrop-filter:blur(20px);
      background:rgba(10,14,23,0.7);
      border-bottom:1px solid rgba(0,255,234,0.3);
      transition:0.6s;
    }
    header.scrolled{
      background:rgba(10,14,23,0.95);
      box-shadow:0 10px 40px rgba(0,255,234,0.3);
    }
    nav{max-width:1400px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:0 2rem;}
    .logo{
      font-size:2.8rem;font-weight:900;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 0 40px rgba(0,255,234,0.6);
    }
    .nav-links a{
      color:var(--text);text-decoration:none;font-weight:700;margin:0 2rem;position:relative;
      text-transform:uppercase;letter-spacing:2px;font-size:0.95rem;
    }
    .nav-links a::after{
      content:'';position:absolute;bottom:-10px;left:0;width:0;height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transition:0.5s;border-radius:3px;
    }
    .nav-links a:hover::after,.nav-links a.active::after{width:100%;box-shadow:var(--glow-cyan);}

    main{padding-top:100px;position:relative;z-index:1;}
    section{padding:10rem 2rem;max-width:1400px;margin:auto;opacity:0;transform:translateY(80px);}
    section.visible{opacity:1;transform:none;transition:all 1.6s cubic-bezier(0.22,1,0.36,1);}

    h2{
      font-size:5rem;text-align:center;margin-bottom:6rem;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
      position:relative;
    }
    }
    h2::after{
      content:'';position:absolute;bottom:-25px;left:50%;transform:translateX(-50%);
      width:200px;height:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:5px;box-shadow:var(--glow-cyan);
    }

    /* Home */
    #home{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;}
    #home h1{
      font-size:9rem;font-weight:900;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 0 100px rgba(0,255,234,0.7), 0 0 180px rgba(255,0,102,0.5);
    }
    .typewriter{
      font-size:2.8rem;color:var(--gray);margin:2.5rem 0;overflow:hidden;
      border-right:6px solid var(--accent);white-space:nowrap;width:0;
      animation:typing 4s steps(50) forwards,blink 0.8s infinite;
      text-shadow:0 0 40px var(--accent);
    }
    @keyframes typing{from{width:0}to{width:50ch}}
    @keyframes blink{50%{border-color:transparent}}

    /* Cards – Glassmorphism + Heavy Glow */
    .card{
      background:var(--card);
      border-radius:30px;overflow:hidden;
      border:1px solid rgba(0,255,234,0.2);
      backdrop-filter:blur(15px);
      box-shadow:0 20px 60px rgba(0,0,0,0.6), var(--glow-cyan;
      transition:all 0.8s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    .card:hover{
      transform:translateY(-70px) scale(1.08);
      box-shadow:0 80px 160px rgba(0,255,234,0.5), 0 0 120px rgba(255,0,102,0.4);
      border-color:var(--accent);
    }
    .card img{
      width:100%;height:520px;object-fit:cover;transition:transform 1.4s;
      filter:brightness(0.9);
    }
    .card:hover img{transform:scale(1.25) rotate(3deg);}
    .card-body{
      padding:3.5rem;
      background:linear-gradient(135deg,rgba(15,20,35,0.95),rgba(10,14,23,0.95));
    }
    .card h3{
      font-size:2.5rem;margin-bottom:1.2rem;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .synopsis{
      margin-top:1.5rem;color:var(--gray);line-height:2;max-height:0;overflow:hidden;
      transition:max-height 1.4s ease;
    }
    .synopsis.open{max-height:600px;padding-top:2rem;}
    .read-more{
      color:var(--accent);font-weight:bold;cursor:pointer;margin-top:1.5rem;display:inline-block;
      text-shadow:0 0 20px var(--accent);transition:0.4s;
    }
    .read-more:hover{transform:translateX(30px);text-shadow:0 0 40px var(--accent);}

    .btn{
      display:inline-block;margin-top:3rem;padding:1.5rem 4.5rem;
      background:linear-gradient(45deg,var(--accent),var(--accent2));
      color:#000;font-weight:900;border-radius:70px;
      box-shadow:var(--glow-cyan),var(--glow-pink);
      transition:0.6s;letter-spacing:2px;
    }
    .btn:hover{
      transform:translateY(-15px) scale(1.1);
      box-shadow:0 50px 120px rgba(0,255,234,0.8), 0 0 100px rgba(255,0,102,0.7);
    }

    /* About image glow */
    .about-img{
      border-radius:35px;
      border:5px solid var(--accent);
      box-shadow:0 0 100px rgba(0,255,234,0.7), 0 0 160px rgba(255,0,102,0.4);
      transition:0.8s;
    }
    .about-img:hover{
      transform:scale(1.07) rotate(3deg);
      box-shadow:0 0 140px rgba(0,255,234,1);
    }

    /* Contact */
    input,textarea{
      background:rgba(20,25,45,0.8);
      border:2px solid rgba(0,255,234,0.3);
      border-radius:20px;padding:1.6rem;color:white;
      transition:0.5s;
    }
    input:focus,textarea:focus{
      border-color:var(--accent);
      box-shadow:var(--glow-cyan);
    }
    button{
      background:linear-gradient(45deg,var(--accent),var(--accent2));
      padding:1.8rem;border-radius:60px;font-size:1.6rem;font-weight:900;
      box-shadow:var(--glow-cyan),var(--glow-pink);
      transition:0.6s;
    }
    button:hover{
      transform:translateY(-15px) scale(1.1);
      box-shadow:0 60px 140px rgba(0,255,234,0.9);
    }

    @media(max-width:768px){
      #home h1{font-size:6rem;}
      .typewriter{font-size:2rem;}
      .about-grid{grid-template-columns:1fr;}
      h2{font-size:3.8rem;}
    }
  </style>
</head>
