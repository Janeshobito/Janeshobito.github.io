<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Janeshwaran R – Darkpath</title>
  <meta name="description" content="Game Developer • 3D Artist • Dark Fantasy Author" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0b0b1a;
      --card: #161625;
      --accent: #8b5cf6;
      --accent2: #ec4899;
      --text: #e2e8f0;
      --gray: #94a3b8;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Segoe UI',sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
      position:relative;
    }
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.4;}

    header{
      position:fixed;top:0;left:0;right:0;
      background:rgba(11,11,26,0.95);
      backdrop-filter:blur(12px);
      z-index:1000;
      border-bottom:1px solid #333344;
      box-shadow:0 8px 32px rgba(0,0,0,0.5);
    }
    nav{max-width:1200px;margin:0 auto;padding:1.2rem;display:flex;justify-content:space-between;align-items:center;}
    .logo{
      font-size:2rem;font-weight:900;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 0 20px rgba(139,92,246,0.5);
    }
    .nav-links{display:flex;gap:2.5rem;}
    .nav-links a{
      color:var(--text);text-decoration:none;font-weight:600;position:relative;
      transition:all 0.4s;letter-spacing:0.5px;
    }
    .nav-links a::after{
      content:'';position:absolute;bottom:-10px;left:50%;width:0;height:3px;
      background:var(--accent);transition:all 0.4s;transform:translateX(-50%);
    }
    .nav-links a:hover,.nav-links a.active{
      color:var(--accent);text-shadow:0 0 10px var(--accent);
    }
    .nav-links a:hover::after,.nav-links a.active::after{width:100%;}

    main{margin-top:80px;position:relative;z-index:1;}

    section{
      display:none;padding:6rem 2rem;max-width:1200px;margin:0 auto;min-height:80vh;
      scroll-margin-top:100px;opacity:0;transform:translateY(50px);transition:all 1s;
    }
    section.active{opacity:1;transform:none;display:block;}

    #home{
      text-align:center;padding-top:12rem;
      background:radial-gradient(circle at center,rgba(139,92,246,0.15),transparent 70%);
    }
    .hero h1{
      font-size:5.5rem;font-weight:900;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:1rem;
      text-shadow:0 0 30px rgba(139,92,246,0.6);
    }
    .typewriter{
      font-size:1.8rem;color:var(--gray);margin:2rem 0;
      border-right:3px solid var(--accent);padding-right:8px;
      white-space:nowrap;overflow:hidden;width:0;animation:typing 4s steps(40) forwards, blink 0.8s infinite;
    }
    @keyframes typing{from{width:0}to{width:38ch}}
    @keyframes blink{50%{border-color:transparent}}

    .socials{
      margin:4rem 0;font-size:2.8rem;gap:2.5rem;display:flex;justify-content:center;flex-wrap:wrap;
    }
    .socials a{
      color:var(--gray);transition:all 0.4s;
      padding:15px;border-radius:50%;background:rgba(139,92,246,0.1);
      box-shadow:0 0 20px rgba(139,92,246,0.2);
    }
    .socials a:hover{
      color:white;transform:translateY(-12px) scale(1.2);
      background:var(--accent);box-shadow:0 0 40px var(--accent);
    }

    h2{
      font-size:3.5rem;text-align:center;margin-bottom:4rem;color:var(--accent);
      text-shadow:0 0 20px rgba(139,92,246,0.4);
      position:relative;
    }
    h2::after{
      content:'';position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);
      width:120px;height:4px;background:var(--accent);border-radius:2px;
      box-shadow:0 0 20px var(--accent);
    }

    .grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:3rem;
    }
    .card{
      background:var(--card);border-radius:24px;overflow:hidden;
      border:1px solid #333344;transition:all 0.6s;
      opacity:0;transform:translateY(60px);
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }
    .card.visible{opacity:1;transform:none;}
    .card:hover{
      transform:translateY(-20px) scale(1.03);
      border-color:var(--accent);
      box-shadow:0 30px 80px rgba(139,92,246,0.4);
    }
    .card img{
      width:100%;height:450px;object-fit:cover;
      transition:transform 0.6s;
    }
    .card:hover img{transform:scale(1.08);}
    .card-body{padding:2rem;}
    .card h3{
      font-size:1.7rem;margin-bottom:1rem;color:var(--accent);
      text-shadow:0 0 10px rgba(139,92,246,0.5);
    }
    .synopsis{
      margin-top:1.2rem;font-size:0.98rem;color:var(--gray);
      max-height:0;overflow:hidden;transition:max-height 0.8s ease;
      line-height:1.8;
    }
    .synopsis.open{max-height:1500px;padding-top:1rem;}
    .read-more{
      color:var(--accent);cursor:pointer;font-weight:bold;margin-top:1rem;display:inline-block;
      transition:0.3s;text-shadow:0 0 10px var(--accent);
    }
    .read-more:hover{transform:translateX(10px);}
    .btn{
      display:inline-block;margin-top:1.5rem;padding:1rem 2rem;
      background:linear-gradient(45deg,var(--accent),var(--accent2));
      color:white;border:none;border-radius:50px;font-weight:bold;
      box-shadow:0 10px 30px rgba(139,92,246,0.4);
      transition:all 0.4s;
    }
    .btn:hover{
      transform:translateY(-5px);box-shadow:0 20px 40px rgba(139,92,246,0.6);
    }

    .about-img{
      border-radius:30px;border:5px solid var(--accent);
      box-shadow:0 0 60px rgba(139,92,246,0.6);
      transition:0.6s;
    }
    .about-img:hover{transform:scale(1.05);}

    form input, form textarea{
      background:rgba(30,30,50,0.8);border:1px solid #444;
      transition:all 0.4s;box-shadow:0 0 15px rgba(139,92,246,0.1);
    }
    form input:focus, form textarea:focus{
      border-color:var(--accent);box-shadow:0 0 25px rgba(139,92,246,0.5);
      outline:none;
    }
    button{
      background:linear-gradient(45deg,var(--accent),var(--accent2));
      padding:1.2rem 3rem;border-radius:50px;
      font-size:1.3rem;transition:all 0.4s;
      box-shadow:0 10px 40px rgba(139,92,246,0.5);
    }
    button:hover{
      transform:translateY(-8px);box-shadow:0 20px 60px rgba(139,92,246,0.7);
    }

    @media(max-width:768px){
      .hero h1{font-size:3.8rem;}
      .typewriter{font-size:1.4rem;}
      .nav-links{gap:1.5rem;font-size:0.9rem;}
    }
  </style>

  <script>
    // Floating particles background
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    class Particle {
      constructor(){this.reset();}
      reset(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
      }
      update(){
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw(){
        ctx.fillStyle = 'rgba(139,92,246,0.6)';
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
      }
    }

    for(let i=0;i<80;i++) particles.push(new Particle());

    function animate(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p=>{p.update();p.draw();});
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize',()=>{
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Section fade-in on scroll
    const observer = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          entry.target.classList.add('active');
          entry.target.querySelectorAll('.card').forEach((card,i)=>{
            setTimeout(()=>card.classList.add('visible'), i*200);
          });
        }
      });
    },{threshold:0.1});

    document.querySelectorAll('section').forEach(sec=>observer.observe(sec));

    // Keep your existing navigation & synopsis toggle scripts
    // (Just paste them here — they still work perfectly)
  </script>
