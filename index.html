<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Janeshwaran R – Darkpath</title>
  <meta name="description" content="Game Developer • 3D Artist • Dark Fantasy Author (Darkpath on Webnovel)" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--bg:#0b0b1a;--panel:#fff;--ink:#000;--accent:#8b5cf6;--comic-yellow:#ffd24d;--comic-red:#ff4646;--zap:#00ffff;--boom:#ff0048;}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow-x:hidden}
    body{font-family:'Comic Neue',sans-serif;background:url('https://raw.githubusercontent.com/Janeshobito/Janeshobito.github.io/main/Screenshot%202025-11-21%20at%2010-17-11%20animated-comics-pages-background-086228377_prevstill.jpeg%20(WEBP%20Image%201920%20%C3%97%201080%20pixels)%20%E2%80%94%20Scaled%20(74%25).png') center/cover fixed;color:#fff;position:relative;cursor:none;}
    body::before{content:'';position:fixed;inset:0;background:rgba(11,11,26,0.92);z-index:-2}
    canvas{position:fixed;inset:0;z-index:-1;opacity:0.65}
    .comic-burst{position:fixed;pointer-events:none;z-index:9999;font-family:'Bangers';font-size:90px;color:var(--comic-yellow);text-shadow:8px 8px 0 #000,-4px -4px 0 var(--comic-red);transform:rotate(var(--r)) scale(0);opacity:0;animation:burst 1.2s forwards;user-select:none;}
    @keyframes burst{0%{transform:rotate(var(--r)) scale(0);opacity:0}40%{transform:rotate(var(--r)) scale(1.6);opacity:1}100%{transform:rotate(var(--r)) scale(1);opacity:0}}
    .speedline{position:fixed;background:var(--zap);height:5px;width:0;opacity:0;transform-origin:left;animation:speed 0.5s ease-out forwards;z-index:998;pointer-events:none;}
    @keyframes speed{0%{width:0;opacity:0.9}100%{width:400px;opacity:0}}
    .zap-particle{position:fixed;width:8px;height:40px;background:var(--zap);opacity:0.7;transform:rotate(var(--r));animation:zapfall linear infinite;pointer-events:none;z-index:2;}
    @keyframes zapfall{0%{transform:translateY(-100px) rotate(var(--r));opacity:0.8}100%{transform:translateY(110vh) rotate(var(--r));opacity:0}}
    #cursor{position:fixed;width:60px;height:60px;pointer-events:none;z-index:9999;border:6px solid var(--accent);border-radius:50%;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);transform:translate(-50%,-50%);mix-blend-mode:difference;transition:0.15s;box-shadow:0 0 40px var(--accent);}
    #cursor.hover{transform:translate(-50%,-50%) scale(1.8)}
    header{position:fixed;top:0;left:0;right:0;padding:18px 28px;z-index:1000;display:flex;justify-content:center;backdrop-filter:blur(12px);background:rgba(0,0,0,0.6);border-bottom:8px solid #000;transition:.4s;}
    header.scrolled{background:rgba(0,0,0,0.95)}
    nav{max-width:1400px;margin:auto;display:flex;justify-content:space-between;align-items:center;width:100%}
    .logo{font-family:'Bangers';font-size:42px;color:var(--comic-red);background:#fff;padding:10px 20px;border:10px solid #000;box-shadow:12px 12px 0 #000}
    .nav-links a{padding:12px 20px;background:#fff;color:#000;border:8px solid #000;font-weight:900;box-shadow:10px 10px 0 #000;margin:0 8px;text-decoration:none;transition:.3s}
    .nav-links a:hover{transform:translateY(-6px);background:var(--comic-yellow)}
    .big-sticker{position:fixed;right:5%;top:10%;font-family:'Bangers';font-size:180px;color:var(--comic-yellow);opacity:0.15;z-index:800;pointer-events:none;animation:shake 5s infinite;}
    @keyframes shake{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(-18deg) scale(1.08)}}
    main{padding-top:140px;max-width:1400px;margin:auto;padding-bottom:100px}
    .panel{background:var(--panel);color:var(--ink);border:12px solid #000;padding:40px;box-shadow:25px 25px 0 #000;position:relative;}
    .sticker-small{position:absolute;right:20px;top:-40px;background:var(--comic-yellow);color:#000;padding:16px 28px;border:10px solid #000;font-family:'Bangers';font-size:28px;transform:rotate(-12deg);box-shadow:12px 12px 0 #000;animation:stickerPop 0.9s ease-out;}
    @keyframes stickerPop{0%{transform:scale(0) rotate(-200deg)}80%{transform:scale(1.4)}100%{transform:scale(1) rotate(-12deg)}}
    .social-icons{display:flex;justify-content:center;gap:30px;margin:40px 0;font-size:48px}
    .social-icons a{color:#333;transition:.4s}
    .social-icons a:hover{color:var(--accent);transform:scale(1.3) rotate(8deg)}
    @media(max-width:900px){.big-sticker{font-size:100px}.comic-burst{font-size:60px}}
  </style>
</head>
<body>
  <div class="big-sticker">DARKPATH!</div>
  <canvas id="bg"></canvas>
  <div id="cursor"></div>
  <header>
    <nav>
      <div class="logo">PORTFOLIO</div>
      <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="projects.html">PROJECTS</a>
        <a href="novels.html">NOVELS</a>
        <a href="contact.html">CONTACT</a>
      </div>
    </nav>
  </header>
  <main>
    <section id="home">
      <div class="panel hero">
        <div class="sticker-small">HERO ERA!</div>
        <h1 style="text-align:center;font-family:'Bangers';font-size:100px;color:var(--comic-red);text-shadow:10px 10px 0 #000;letter-spacing:8px;margin:30px 0">
          JANESH <span style="color:var(--comic-yellow);font-size:120px">WARAN</span> R
        </h1>
        <p style="text-align:center;font-size:22px;color:#222;margin:20px 0">
          Game Developer • 3D Artist • Dark Fantasy Author • Game Designer<br>
          <strong style="font-family:'Bangers';color:var(--comic-yellow);font-size:30px">Pen Name: DARKPATH</strong>
        </p>
        <div class="social-icons">
          <a href="https://www.artstation.com/janeshobito283" target="_blank"><i class="fab fa-artstation"></i></a>
          <a href="https://www.linkedin.com/in/janeshwaran-r-a33729285/" target="_blank"><i class="fab fa-linkedin"></i></a>
          <a href="https://www.webnovel.com/profile/4327938398" target="_blank"><i class="fas fa-book-open"></i></a>
          <a href="mailto:janeshwaranboito283@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas=document.getElementById('bg');const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
    if(gl){canvas.width=innerWidth;canvas.height=innerHeight;
    const vs=`attribute vec2 p;varying vec2 v;void main(){v=uv;gl_Position=vec4(p,0,1);}`;
    const fs=`precision highp float;uniform float t;varying vec2 v;void main(){vec2 p=v*2.-1.;float d=length(p);float w=sin(d*28.-t*7.)*0.05;vec3 c=mix(vec3(0.4,0.1,0.9),vec3(1.0,0.3,1.2),sin(t+d*15.));gl_FragColor=vec4(c+w,0.8);}`;
    const prog=gl.createProgram();[vs,fs].forEach((s,i)=>{let h=gl.createShader(i?gl.FRAGMENT_SHADER:gl.VERTEX_SHADER);gl.shaderSource(h,s);gl.compileShader(h);gl.attachShader(prog,h);});
    gl.linkProgram(prog);gl.useProgram(prog);const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);const pos=gl.getAttribLocation(prog,"p");gl.enableVertexAttribArray(pos);gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
    const tLoc=gl.getUniformLocation(prog,"t");function render(time){gl.uniform1f(tLoc,time*0.001);gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(render);}requestAnimationFrame(render);
    window.addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight;});}
    const cursor=document.getElementById('cursor');document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});
    document.addEventListener('mouseover',e=>{if(e.target.closest('a'))cursor.classList.add('hover');else cursor.classList.remove('hover');});
    window.addEventListener('scroll',()=>{document.querySelector('header').classList.toggle('scrolled',scrollY>100);});
    const bursts=["BAM!","POW!","KABOOM!","ZAP!","BOOM!","CRASH!","WHAMM!","BANG!"];
    setInterval(()=>{if(Math.random()<0.35){const b=document.createElement('div');b.className='comic-burst';b.textContent=bursts[Math.floor(Math.random()*bursts.length)];
    b.style.left=Math.random()*100+'vw';b.style.top=Math.random()*100+'vh';b.style.setProperty('--r',(Math.random()*60-30)+'deg');document.body.appendChild(b);
    setTimeout(()=>b.remove(),1300);}},2000);
    let lastX=0,lastY=0,lastTime=0;document.addEventListener('mousemove',e=>{const now=Date.now();const dist=Math.hypot(e.clientX-lastX,e.clientY-lastY);
    if(dist>100&&now-lastTime<120){for(let i=0;i<6;i++){const l=document.createElement('div');l.className='speedline';l.style.left=e.clientX+'px';l.style.top=e.clientY+'px';
    l.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(l);setTimeout(()=>l.remove(),600);}lastX=e.clientX;lastY=e.clientY;lastTime=now;}});
    setInterval(()=>{const z=document.createElement('div');z.className='zap-particle';z.style.left=Math.random()*100+'vw';
    z.style.animationDuration=(Math.random()*3+2.5)+'s';z.style.setProperty('--r',Math.random()*360+'deg');document.body.appendChild(z);
    setTimeout(()=>z.remove(),7000);},500);
  </script>
</body>
</html>
