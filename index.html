<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Janeshwaran R – Darkpath</title>
  <meta name="description" content="Game Developer • 3D Artist • Dark Fantasy Author" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    :root{--bg:#0b0b1a;--card:#161625;--accent:#8b5cf6;--accent2:#ec4899;--text:#e2e8f0;--gray:#94a3b8;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;cursor:none;}
    #webgl{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}
    #cursor{
      position:fixed;width:40px;height:40px;pointer-events:none;z-index:9999;
      background:radial-gradient(circle,var(--accent) 0%,transparent 70%);
      border-radius:50%;mix-blend-mode:difference;transform:translate(-50%,-50%);
      transition:transform 0.1s ease;opacity:0.8;
    }
    header{
      position:fixed;top:0;left:0;right:0;background:transparent;z-index:1000;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      padding:1.5rem 0;transition:background 0.4s;
    }
    header.scrolled{background:rgba(11,11,26,0.95);box-shadow:0 10px 40px rgba(0,0,0,0.7);}
    nav{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 2rem;}
    .logo{font-size:2.4rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
    .nav-links a{color:var(--text);text-decoration:none;font-weight:600;margin:0 1.5rem;position:relative;}
    .nav-links a::after{content:'';position:absolute;bottom:-8px;left:0;width:0;height:3px;background:var(--accent);transition:width 0.4s;}
    .nav-links a:hover::after,.nav-links a.active::after{width:100%;}

    main{padding-top:100px;position:relative;z-index:1;}
    section{padding:8rem 2rem;max-width:1200px;margin:0 auto;opacity:0;}
    section.visible{opacity:1;}

    #home{text-align:center;padding:15vh 2rem 10vh;}
    #home h1{font-size:7rem;font-weight:900;margin:0;line-height:1;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
      text-shadow:0 0 60px rgba(139,92,246,0.6);}
    .typewriter{font-size:2rem;color:var(--gray);margin:2rem 0;overflow:hidden;
      border-right:4px solid var(--accent);white-space:nowrap;width:0;animation:typing 4s steps(50) forwards,blink 0.8s infinite;}
    @keyframes typing{from{width:0}to{width:50ch}} @keyframes blink{50%{border-color:transparent}}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:3rem;}
    .card{
      background:var(--card);border-radius:30px;overflow:hidden;position:relative;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);transition:all 0.6s;transform-style:preserve-3d;
    }
    .card:hover{transform:translateY(-30px) rotateY(5deg) rotateX(5deg);box-shadow:0 50px 120px rgba(139,92,246,0.4);}
    .card img{width:100%;height:480px;object-fit:cover;transition:transform 0.8s;}
    .card:hover img{transform:scale(1.12);}
    .card-body{padding:2.5rem;background:linear-gradient(135deg,rgba(22,22,37,0.95),rgba(11,11,26,0.95));}
    .card h3{font-size:1.9rem;margin-bottom:1rem;color:var(--accent);text-shadow:0 0 20px var(--accent);}
    .btn{
      display:inline-block;margin-top:1.5rem;padding:1rem 2.5rem;background:linear-gradient(45deg,var(--accent),var(--accent2));
      color:white;border-radius:50px;font-weight:bold;box-shadow:0 15px 40px rgba(139,92,246,0.5);
      transition:all 0.5s;
    }
    .btn:hover{transform:translateY(-10px);box-shadow:0 30px 80px rgba(139,92,246,0.8);}

    @media(max-width:768px){
      #home h1{font-size:4.5rem;}
      .typewriter{font-size:1.5rem;}
      .nav-links{display:none;} /* Add mobile menu later if needed */
    }
  </style>
</head>
<body>

  <!-- WebGL Background -->
  <div id="webgl"></div>

  <!-- Custom Cursor -->
  <div id="cursor"></div>

  <header>
    <nav>
      <div class="logo">Janeshwaran R</div>
      <div class="nav-links">
        <a href="#home" class="active">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#novels">Novels</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>
  </header>

  <main>

    <section id="home" class="visible">
      <h1 data-3d>Janeshwaran R</h1>
      <p class="typewriter">Master of Dark Worlds & Unreal Realities</p>
      <p style="font-size:1.8rem;color:var(--gray);margin:3rem 0;">
        Game Developer • 3D Artist • Dark Fantasy Author<br>
        <strong style="color:var(--accent);">Pen Name: Darkpath</strong>
      </p>
      <div style="margin:4rem 0;font-size:3rem;display:flex;justify-content:center;gap:3rem;flex-wrap:wrap;">
        <a href="https://www.artstation.com/janeshboito283" target="_blank" style="color:var(--gray);transition:all 0.5s;"><i class="fab fa-artstation"></i></a>
        <a href="https://www.linkedin.com/in/janeshwaran-r-a33729285/" target="_blank" style="color:var(--gray);transition:all 0.5s;"><i class="fab fa-linkedin"></i></a>
        <a href="https://www.webnovel.com/profile/4327938398" target="_blank" style="color:var(--gray);transition:all 0.5s;"><i class="fas fa-book-open"></i></a>
        <a href="mailto:janeshwaranboito283@gmail.com" style="color:var(--gray);transition:all 0.5s;"><i class="fas fa-envelope"></i></a>
      </div>
    </section>

    <!-- Keep your full About, Projects, Novels, Contact sections here -->
    <!-- (Same as before – just paste them) -->

  </main>

  <script>
    // === WebGL Liquid Dark Energy Background ===
    let scene, camera, renderer, material;
    function initWebGL() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({canvas: document.getElementById('webgl'), alpha: true, antialias: true});
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      camera.position.z = 3;

      const vertexShader = `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;
      const fragmentShader = `
        uniform float uTime;
        uniform vec2 uMouse;
        varying vec2 vUv;
        void main() {
          vec2 p = vUv - uMouse;
          float dist = length(p);
          float wave = sin(dist * 20.0 - uTime * 5.0) * 0.02;
          vec3 color = mix(vec3(0.3,0.1,0.8), vec3(0.9,0.3,1.0), sin(uTime + dist * 10.0));
          gl_FragColor = vec4(color + wave, 0.6);
        }
      `;

      material = new THREE.ShaderMaterial({
        vertexShader, fragmentShader,
        uniforms: { uTime: {value: 0}, uMouse: {value: new THREE.Vector2(0.5, 0.5)} }
      });

      const geometry = new THREE.PlaneGeometry(10, 10, 128, 128);
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      function animate() {
        material.uniforms.uTime.value += 0.02;
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      animate();
    }

    // Mouse interaction
    document.addEventListener('mousemove', (e) => {
      const x = e.clientX / window.innerWidth;
      const y = 1 - (e.clientY / window.innerHeight);
      if (material) material.uniforms.uMouse.value.set(x, y);
      document.getElementById('cursor').style.left = e.clientX + 'px';
      document.getElementById('cursor').style.top = e.clientY + 'px';
    });

    // Header scroll effect
    window.addEventListener('scroll', () => {
      document.querySelector('header').classList.toggle('scrolled', window.scrollY > 100);
    });

    // GSAP + ScrollTrigger for insane reveals
    gsap.registerPlugin(ScrollTrigger);
    gsap.utils.toArray('section').forEach(sec => {
      gsap.to(sec, {
        scrollTrigger: {
          trigger: sec,
          start: "top 80%",
          onEnter: () => sec.classList.add('visible')
        }
      });
    });

    // 3D Tilt Cards
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateY = (x - centerX) / 15;
        const rotateX = (centerY - y) / 15;
        card.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg) translateY(-20px)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
      });
    });

    window.addEventListener('load', initWebGL);
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
