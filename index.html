<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Janeshwaran R – Darkpath</title>
  <meta name="description" content="Game Developer • 3D Artist • Dark Fantasy Author (Darkpath on Webnovel)" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Creepster&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root{
      --red: #E6242A;
      --yellow: #FFD200;
      --black: #000;
      --white: #FFF;
      --gray: #222;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family: 'Comic Neue', cursive;
      background: #111;
      color: white;
      overflow-x: hidden;
      cursor: none;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(230,36,42,0.3) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255,210,0,0.3) 0%, transparent 40%),
        repeating-conic-gradient(from 45deg at 50% 50%, #000 0deg, #000 90deg, #111 90deg, #111 180deg);
    }
    canvas{position:fixed;inset:0;z-index:-2;opacity:0.15;}

    /* Custom Comic Cursor */
    #cursor{
      position:fixed;width:70px;height:70px;pointer-events:none;z-index:9999;
      background: radial-gradient(circle, var(--yellow) 20%, transparent 70%);
      border: 6px solid var(--black);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 30px var(--red);
      transition: transform 0.1s;
    }
    #cursor::after{
      content:"POW!";
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      font-family:'Bangers';font-size:14px;color:var(--black);opacity:0;
      transition:opacity 0.3s;
    }
    body:hover #cursor::after{opacity:1;}

    /* STARBURST HEADER */
    header{
      background: var(--red);
      padding: 3rem 0;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0,0,0,0.9);
    }
    header::before{
      content:"";
      position:absolute;
      top:-150px;left:50%;transform:translateX(-50%);
      width:1400px;height:800px;
      background: radial-gradient(circle, var(--yellow) 10%, var(--red) 40%, transparent 70%);
      opacity:0.6;
    }
    .logo{
      font-family: 'Bangers', cursive;
      font-size: 11rem;
      color: var(--yellow);
      text-shadow: 10px 10px 0 var(--black);
      letter-spacing: 10px;
      position: relative;
      z-index: 2;
      transform: rotate(-5deg);
    }
    .tagline{
      font-family: 'Creepster', cursive;
      font-size: 3rem;
      color: white;
      text-shadow: 6px 6px 0 var(--black);
      margin-top: -30px;
    }

    nav{
      background: var(--black);
      padding: 1.5rem 0;
      text-align: center;
      border-top: 12px solid var(--yellow);
      border-bottom: 12px solid var(--yellow);
    }
    .nav-links a{
      color: var(--yellow);
      text-decoration: none;
      font-family: 'Bangers', cursive;
      font-size: 2.8rem;
      margin: 0 2.5rem;
      text-shadow: 5px 5px 0 var(--black);
      transition: 0.3s;
    }
    .nav-links a:hover{ color: white; transform: scale(1.2); }

    main{ max-width: 1500px; margin: 4rem auto; padding: 0 2rem; }

    section{
      background: white;
      color: var(--black);
      margin: 6rem 0;
      padding: 5rem;
      border: 12px solid var(--black);
      position: relative;
      transform: rotate(-1.5deg);
      box-shadow: 25px 25px 0 rgba(0,0,0,0.6);
      opacity: 0;
      transform: translateY(100px) rotate(-1.5deg);
      transition: all 1.6s cubic-bezier(0.22,1,0.36,1);
    }
    section.visible{
      opacity: 1;
      transform: translateY(0) rotate(-1.5deg);
    }
    section:nth-child(even){ transform: rotate(1.5deg); }
    section:nth-child(even).visible{ transform: translateY(0) rotate(1.5deg); }

    h2{
      font-family: 'Bangers', cursive;
      font-size: 7rem;
      color: var(--red);
      text-align: center;
      margin-bottom: 4rem;
      text-shadow: 8px 8px 0 var(--yellow);
      transform: rotate(-4deg);
    }

    /* COMIC CARD WITH 3D TILT */
    .grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 4rem;
    }
    .card{
      background: white;
      border: 12px solid var(--black);
      overflow: hidden;
      box-shadow: 30px 30px 0 var(--red);
      transition: all 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
      cursor: pointer;
      transform: perspective(1000px) rotateY(0) rotateX(0);
    }
    .card:hover{
      transform: translateY(-40px) scale(1.05);
      box-shadow: 60px 60px 0 var(--yellow);
    }
    .card img{
      width: 100%;
      height: 520px;
      object-fit: cover;
      transition: transform 1.5s;
    }
    .card:hover img{ transform: scale(1.15); }
    .card-body{
      padding: 3rem;
      background: linear-gradient(135deg, #fff, #ffe5b4);
    }
    .card h3{
      font-family: 'Bangers', cursive;
      font-size: 2.8rem;
      color: var(--red);
      text-shadow: 5px 5px 0 var(--yellow);
      margin-bottom: 1rem;
    }
    .synopsis{
      margin-top: 1.5rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 1.2s ease;
      font-size: 1.3rem;
      line-height: 1.8;
    }
    .synopsis.open{ max-height: 5000px; padding-top: 2rem; }
    .read-more{
      color: var(--red);
      font-weight: bold;
      font-size: 1.4rem;
      cursor: pointer;
      display: inline-block;
      margin-top: 1rem;
      text-shadow: 3px 3px 0 var(--yellow);
    }
    .btn{
      display: inline-block;
      margin-top: 2rem;
      padding: 1.5rem 4rem;
      background: var(--red);
      color: white;
      font-family: 'Bangers', cursive;
      font-size: 2.2rem;
      border: 10px solid var(--black);
      box-shadow: 12px 12px 0 var(--black);
      transform: rotate(-3deg);
    }
    .btn:hover{
      background: var(--yellow);
      color: var(--black);
      transform: rotate(5deg) translateY(-10px);
    }

    /* 3D TILT ON HOVER */
    .card{
      transform-style: preserve-3d;
      transition: transform 0.4s;
    }

    /* ABOUT */
    .about-grid{
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 5rem;
      align-items: center;
    }
    .about-img{
      border: 14px solid var(--black);
      box-shadow: 30px 30px 0 var(--yellow);
      transform: rotate(6deg);
      transition: 0.6s;
    }
    .about-img:hover{ transform: rotate(12deg) scale(1.08); }

    /* CONTACT */
    .contact-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 3rem;
      margin: 4rem 0;
    }
    .contact-item{
      background: var(--yellow);
      color: var(--black);
      padding: 3rem;
      border: 12px solid var(--black);
      text-align: center;
      transform: rotate(3deg);
      box-shadow: 20px 20px 0 var(--red);
    }
    .contact-item i{ font-size: 5rem; color: var(--red); }

    form input, form textarea{
      width: 100%;
      padding: 1.8rem;
      margin: 1rem 0;
      border: 10px solid var(--black);
      font-size: 1.5rem;
      font-family: 'Comic Neue', cursive;
    }
    button{
      background: var(--red);
      color: white;
      padding: 2rem 5rem;
      font-family: 'Bangers', cursive;
      font-size: 3rem;
      border: 12px solid var(--black);
      cursor: pointer;
      box-shadow: 15px 15px 0 var(--black);
    }
    button:hover{
      background: var(--yellow);
      color: var(--black);
      transform: translate(-10px, -10px);
      box-shadow: 30px 30px 0 var(--black);
    }

    @media(max-width:768px){
      .logo{font-size:7rem;}
      h2{font-size:4.5rem;}
      .about-grid{grid-template-columns:1fr;}
      .nav-links a{font-size:2rem;margin:0 1rem;}
    }
  </style>
</head>

  <script>
    // === YOUR EXACT ORIGINAL SCRIPT (3D tilt, scroll anim, cursor, WebGL, etc.) ===
    const canvas = document.getElementById('bg');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    canvas.width = innerWidth; canvas.height = innerHeight;
    // ... (your full WebGL shader code) ...

    // Custom cursor
    document.addEventListener('mousemove', e => {
      const cursor = document.getElementById('cursor');
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // 3D TILT CARDS — WORKING 100%
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        card.style.transform = `perspective(1200px) rotateY(${x*40}deg) rotateX(${-y*40}deg) translateZ(100px)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(1200px) rotateY(0) rotateX(0)';
      });
    });

    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('section').forEach(s => observer.observe(s));

    // Synopsis toggle
    document.querySelectorAll('.read-more').forEach(btn => {
      btn.onclick = () => {
        const syn = btn.previousElementSibling;
        syn.classList.toggle('open');
        btn.textContent = syn.classList.contains('open') ? 'COLLAPSE' : 'Read Full Synopsis';
      };
    });

    window.addEventListener('resize', () => {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    });
  </script>
