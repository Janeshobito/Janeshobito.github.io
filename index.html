  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--accent:#8b5cf6;--accent2:#ec4899;--text:#e2e8f0;--gray:#94a3b8;--bg:#0b0b1a;--card:#161625;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',sans-serif;background:#0b0b1a;color:var(--text);overflow-x:hidden;cursor:none;}
    canvas{position:fixed;inset:0;z-index:-1;}
    #cursor{
      position:fixed;width:70px;height:70px;pointer-events:none;z-index:9999;
      background:radial-gradient(circle at 20% 20%,rgba(139,92,246,0.9),transparent 70%);
      border:3px solid rgba(139,92,246,0.6);border-radius:50%;
      transform:translate(-50%,-50%);mix-blend-mode:screen;
      box-shadow:0 0 60px rgba(139,92,246,0.8);transition:0.06s ease-out;
    }
    header{
      position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.8rem 0;
      backdrop-filter:blur(30px);background:rgba(11,11,26,0.95);transition:0.8s;
      border-bottom:1px solid rgba(139,92,246,0.2);
    }
    header.scrolled{box-shadow:0 20px 80px rgba(0,0,0,0.9);}
    nav{max-width:1500px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:0 3rem;}
    .logo{font-size:3rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
      text-shadow:0 0 50px rgba(139,92,246,0.7);}
    .nav-links a{color:var(--text);text-decoration:none;font-weight:700;margin:0 2.5rem;position:relative;transition:0.5s;}
    .nav-links a::after{content:'';position:absolute;bottom:-15px;left:0;width:0;height:5px;background:var(--accent);transition:0.6s ease-out;border-radius:3px;}
    .nav-links a:hover::after,.nav-links a.active::after{width:100%;}

    main{padding-top:120px;position:relative;z-index:1;}
    section{padding:14rem 2rem;max-width:1500px;margin:auto;opacity:0;transform:translateY(120px);}
    section.visible{opacity:1;transform:none;transition:opacity 2s ease-out,transform 2s cubic-bezier(0.16,1,0.3,1);}

    h2{font-size:5.5rem;text-align:center;margin-bottom:7rem;color:var(--accent);position:relative;}
    h2::after{content:'';position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:200px;height:8px;background:var(--accent);border-radius:5px;box-shadow:0 0 60px var(--accent);}

    #home{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;}
    #home h1{font-size:10rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
      text-shadow:0 0 150px rgba(139,92,246,1);animation:float 8s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-40px)}}

    .typewriter{font-size:3rem;color:var(--gray);margin:4rem 0;overflow:hidden;border-right:7px solid var(--accent);
      white-space:nowrap;width:0;animation:typing 5s steps(60) forwards,blink 1s infinite;}
    @keyframes typing{from{width:0}to{width:60ch}} @keyframes blink{50%{border-color:transparent}}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:6rem;}
    .card{
      background:var(--card);border-radius:56px;overflow:hidden;position:relative;
      box-shadow:0 40px 120px rgba(0,0,0,0.9);will-change:transform;
      transform:perspective(2000px) rotateX(0deg) rotateY(0deg) translateZ(0);
      transition:transform 0.01s linear;
    }
    .card img{width:100%;height:600px;object-fit:cover;transition:transform 1.8s cubic-bezier(0.16,1,0.3,1);}
    .card:hover img{transform:scale(1.3);}
    .card-body{padding:4rem;background:linear-gradient(135deg,rgba(22,22,37,0.99),rgba(11,11,26,0.99));}
    .card h3{font-size:2.6rem;margin-bottom:1.5rem;color:var(--accent);text-shadow:0 0 50px var(--accent);}
    .btn{
      display:inline-block;margin-top:3.5rem;padding:1.6rem 5rem;background:linear-gradient(45deg,var(--accent),var(--accent2));
      color:white;border-radius:90px;font-weight:bold;box-shadow:0 40px 100px rgba(139,92,246,1);
      transition:all 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .btn:hover{transform:translateY(-20px) scale(1.1);box-shadow:0 80px 180px rgba(139,92,246,1.2);}

    @media(max-width:768px){
      #home h1{font-size:6rem;}
      .typewriter{font-size:2.2rem;}
      h2{font-size:4rem;}
    }
  </style>

  <script>
    // FULL WEBGL SHADER PARTICLES + LIQUID + MOUSE DISTORTION
    const canvas = document.getElementById('glcanvas');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    canvas.width = innerWidth; canvas.height = innerHeight;

    const vsSource = `
      attribute vec2 position;
      void main() { gl_Position = vec4(position, 0.0, 1.0); }
    `;

    const fsSource = `
      precision highp float;
      uniform float u_time;
      uniform vec2 u_mouse;
      uniform vec2 u_resolution;

      vec3 hue(float h) {
        vec3 c = vec3(0.6, 0.1, 1.0);
        return c + cos(6.28318*(h + vec3(0.0,0.33,0.67)));
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / u_resolution.xy;
        vec2 p = uv - u_mouse;
        float dist = length(p);
        float ripple = sin(dist * 40.0 - u_time * 8.0) * 0.03;
        float glow = 0.02 / (dist + 0.01);

        vec3 color = hue(u_time * 0.1 + dist * 2.0) * glow;
        color += ripple * vec3(0.5, 0.2, 1.0);

        // Particles
        vec2 particle = fract(uv * 30.0 + u_time * 0.1);
        float particleGlow = smoothstep(0.0, 0.1, length(particle - 0.5)) * 0.8;
        color += particleGlow * vec3(0.8, 0.4, 1.5);

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    function createShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      gl.attachShader(program, shader);
    }

    const program = gl.createProgram();
    createShader(gl, gl.VERTEX_SHADER, vsSource);
    createShader(gl, gl.FRAGMENT_SHADER, fsSource);
    gl.linkProgram(program);
    gl.useProgram(program);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
    const pos = gl.getAttribLocation(program, "position");
    gl.enableVertexAttribArray(pos);
    gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

    const timeLoc = gl.getUniformLocation(program, "u_time");
    const mouseLoc = gl.getUniformLocation(program, "u_mouse");
    const resLoc = gl.getUniformLocation(program, "u_resolution");

    let mouse = [0.5, 0.5];
    document.addEventListener('mousemove', e => {
      mouse = [e.clientX / innerWidth, 1 - e.clientY / innerHeight];
      document.getElementById('cursor').style.left = e.clientX + 'px';
      document.getElementById('cursor').style.top = e.clientY + 'px';
    });

    function render(now) {
      gl.uniform1f(timeLoc, now * 0.001);
      gl.uniform2f(mouseLoc, ...mouse);
      gl.uniform2fv(resLoc, [canvas.width, canvas.height]);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    // Ultra-smooth 3D card physics
    document.querySelectorAll('.card').forEach(card => {
      let bounds;
      const handleMove = e => {
        const x = (e.clientX - bounds.left) / bounds.width - 0.5;
        const y = (e.clientY - bounds.top) / bounds.height - 0.5;
        card.style.transform = `perspective(2000px) rotateY(${x*45}deg) rotateX(${-y*45}deg) translateZ(150px) scale(1.05)`;
      };
      card.addEventListener('mouseenter', () => {
        bounds = card.getBoundingClientRect();
        card.style.transition = 'none';
      });
      card.addEventListener('mousemove', handleMove);
      card.addEventListener('mouseleave', () => {
        card.style.transition = 'all 1.6s cubic-bezier(0.16,1,0.3,1)';
        card.style.transform = 'perspective(2000px) rotateX(0) rotateY(0) translateZ(0) scale(1)';
      });
    });

    // Smooth scroll reveal
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.2 });
    document.querySelectorAll('section').forEach(s => observer.observe(s));

    window.addEventListener('resize', () => {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    });
  </script>
