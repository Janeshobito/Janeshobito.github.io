<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YourName – Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0b0b1a;
      --card: #161625;
      --accent: #8b5cf6;
      --text: #e2e8f0;
      --gray: #94a3b8;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }
    /* Enable smooth scrolling globally */
    html {
      scroll-behavior: smooth;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(11,11,26,0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      border-bottom: 1px solid #333344;
    }
    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent);
    }
    .nav-links {
      display: flex;
      gap: 2rem;
    }
    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      position: relative;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--accent);
    }
    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }

    main { margin-top: 80px; }
    section {
      display: none;
      padding: 4rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 80vh;
      scroll-margin-top: 100px; /* Fixes smooth scroll offset due to fixed header */
    }
    section.active { display: block; animation: fadeIn 0.6s; }
    @keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:none;} }

    /* Rest of your styles (unchanged) */
    #home { text-align: center; padding-top: 8rem; background: linear-gradient(135deg, #1a1a2e, #16213e); }
    .hero h1 { font-size: 4.5rem; margin-bottom: 1rem; background: linear-gradient(90deg, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { font-size: 1.4rem; color: var(--gray); max-width: 700px; margin: 0 auto 2rem; }
    .socials { margin-top: 3rem; font-size: 2rem; gap: 1.5rem; display: flex; justify-content: center; }
    .socials a { color: var(--gray); transition: 0.3s; }
    .socials a:hover { color: var(--accent); transform: translateY(-5px); }

    h2 { font-size: 3rem; text-align: center; margin-bottom: 3rem; color: var(--accent); }
    .about-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 4rem; align-items: center; }
    .about-img { width: 100%; border-radius: 20px; border: 3px solid var(--accent); box-shadow: 0 0 30px rgba(139,92,246,0.4); }
    .skills { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem; }
    .skill { background: var(--card); padding: 0.8rem 1.5rem; border-radius: 50px; border: 1px solid var(--accent); }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
    .card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid #333344; transition: 0.4s; }
    .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(139,92,246,0.2); border-color: var(--accent); }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .card-body { padding: 1.5rem; }
    .card h3 { margin-bottom: 0.5rem; color: var(--accent); }
    .card p { color: var(--gray); font-size: 0.95rem; }
    .btn { display: inline-block; margin-top: 1rem; padding: 0.7rem 1.5rem; background: var(--accent); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }

    form { max-width: 600px; margin: 0 auto; display: grid; gap: 1.5rem; }
    input, textarea { width: 100%; padding: 1rem; background: var(--card); border: 1px solid #333344; border-radius: 12px; color: white; }
    button { padding: 1rem 2rem; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; }

    @media (max-width: 768px) {
      .about-grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 3rem; }
      .nav-links { gap: 1rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="logo">YourName</div>
      <div class="nav-links">
        <a href="#home" class="active">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#novels">Novels</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section id="home" class="active"> <!-- Home content same as before --> </section>
    <section id="about"> <!-- About content --> </section>
    <section id="projects"> <!-- Projects --> </section>
    <section id="novels"> <!-- Novels --> </section>
    <section id="contact"> <!-- Contact --> </section>
  </main>

  <!-- Paste ALL your previous section HTML here (Home, About, Projects, Novels, Contact) -->
  <!-- I'm keeping it short here for clarity, but use your full sections from the last version -->

  <script>
    // Enhanced smooth navigation with active state + perfect scroll offset
    const navLinks = document.querySelectorAll('.nav-links a');
    const sections = document.querySelectorAll('section');

    navLinks.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        
        const targetId = link.getAttribute('href');
        const targetSection = document.querySelector(targetId);

        // Remove active from all
        navLinks.forEach(l => l.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));

        // Add active to clicked
        link.classList.add('active');
        targetSection.classList.add('active');

        // Smooth scroll with proper offset for fixed header
        window.scrollTo({
          top: targetSection.offsetTop - 90,
          behavior: 'smooth'
        });
      });
    });

    // Optional: Update active link on scroll (nice touch)
    window.addEventListener('scroll', () => {
      let current = '';
      sections.forEach(section => {
        const sectionTop = section.offsetTop - 150;
        if (scrollY >= sectionTop) {
          current = section.getAttribute('id');
        }
      });

      navLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === `#${current}`) {
          link.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
