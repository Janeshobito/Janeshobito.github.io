<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novels – Darkpath</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--bg:#0b0b1a;--panel:#fff;--ink:#000;--accent:#8b5cf6;--comic-yellow:#ffd24d;--comic-red:#ff4646;--zap:#00ffff;--boom:#ff0048;}
    *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow-x:hidden}
    body{font-family:'Comic Neue',sans-serif;background:url('https://raw.githubusercontent.com/Janeshobito/Janeshobito.github.io/main/Screenshot%202025-11-21%20at%2010-17-11%20animated-comics-pages-background-086228377_prevstill.jpeg%20(WEBP%20Image%201920%20%C3%97%201080%20pixels)%20%E2%80%94%20Scaled%20(74%25).png') center/cover fixed;color:#fff;position:relative;cursor:none;}
    body::before{content:'';position:fixed;inset:0;background:rgba(11,11,26,0.92);z-index:-2}
    canvas{position:fixed;inset:0;z-index:-1;opacity:0.65}
    .comic-burst{position:fixed;pointer-events:none;z-index:9999;font-family:'Bangers';font-size:90px;color:var(--comic-yellow);text-shadow:8px 8px 0 #000,-4px -4px 0 var(--comic-red);transform:rotate(var(--r)) scale(0);opacity:0;animation:burst 1.2s forwards;user-select:none;}
    @keyframes burst{0%{transform:rotate(var(--r)) scale(0);opacity:0}40%{transform:rotate(var(--r)) scale(1.6);opacity:1}100%{transform:rotate(var(--r)) scale(1);opacity:0}}
    .speedline{position:fixed;background:var(--zap);height:5px;width:0;opacity:0;transform-origin:left;animation:speed 0.5s ease-out forwards;z-index:998;pointer-events:none;}
    @keyframes speed{0%{width:0;opacity:0.9}100%{width:400px;opacity:0}}
    .zap-particle{position:fixed;width:8px;height:40px;background:var(--zap);opacity:0.7;transform:rotate(var(--r));animation:zapfall linear infinite;pointer-events:none;z-index:2;}
    @keyframes zapfall{0%{transform:translateY(-100px) rotate(var(--r));opacity:0.8}100%{transform:translateY(110vh) rotate(var(--r));opacity:0}}
    .card::after{content:"SLAM!";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Bangers';font-size:70px;color:var(--boom);opacity:0;text-shadow:6px 6px 0 #000;pointer-events:none;}
    .card:hover::after{animation:slam 0.7s ease-out forwards;}
    @keyframes slam{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(2.2);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
    #cursor{position:fixed;width:60px;height:60px;pointer-events:none;z-index:9999;border:6px solid var(--accent);border-radius:50%;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);transform:translate(-50%,-50%);mix-blend-mode:difference;transition:0.15s;box-shadow:0 0 40px var(--accent);}
    #cursor.hover{transform:translate(-50%,-50%) scale(1.8)}
    header{position:fixed;top:0;left:0;right:0;padding:18px 28px;z-index:1000;display:flex;justify-content:center;backdrop-filter:blur(12px);background:rgba(0,0,0,0.6);border-bottom:8px solid #000;transition:.4s;}
    header.scrolled{background:rgba(0,0,0,0.95)}
    nav{max-width:1400px;margin:auto;display:flex;justify-content:space-between;align-items:center;width:100%}
    .logo{font-family:'Bangers';font-size:42px;color:var(--comic-red);background:#fff;padding:10px 20px;border:10px solid #000;box-shadow:12px 12px 0 #000}
    .nav-links a{padding:12px 20px;background:#fff;color:#000;border:8px solid #000;font-weight:900;box-shadow:10px 10px 0 #000;margin:0 8px;text-decoration:none;transition:.3s}
    .nav-links a:hover{transform:translateY(-6px);background:var(--comic-yellow)}
    .big-sticker{position:fixed;right:5%;top:10%;font-family:'Bangers';font-size:180px;color:var(--comic-yellow);opacity:0.15;z-index:800;pointer-events:none;animation:shake 5s infinite;}
    @keyframes shake{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(-18deg) scale(1.08)}}
    main{padding-top:140px;max-width:1400px;margin:auto;padding-bottom:100px}
    .panel{background:var(--panel);color:var(--ink);border:12px solid #000;padding:40px;box-shadow:25px 25px 0 #000;position:relative;}
    .sticker-small{position:absolute;right:20px;top:-40px;background:var(--comic-yellow);color:#000;padding:16px 28px;border:10px solid #000;font-family:'Bangers';font-size:28px;transform:rotate(-12deg);box-shadow:12px 12px 0 #000;animation:stickerPop 0.9s ease-out;}
    @keyframes stickerPop{0%{transform:scale(0) rotate(-200deg)}80%{transform:scale(1.4)}100%{transform:scale(1) rotate(-12deg)}}
    .section-title{font-family:'Bangers';font-size:60px;color:var(--comic-red);text-shadow:6px 6px 0 #000;margin-bottom:20px;}
    .section-title small{font-size:24px;color:#666}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:40px}
    .card{background:var(--panel);border:12px solid #000;padding:20px;box-shadow:20px 20px 0 #000;transition:all .6s cubic-bezier(.175,.885,.32,1.8);}
    .card:hover{transform:translateY(-35px) rotate(-5deg) scale(1.12)!important;box-shadow:60px 60px 0 rgba(0,0,0,0.9);z-index:10;}
    .card img{width:100%;height:500px;object-fit:cover;border:10px solid #000}
    .card h3{font-family:'Bangers';font-size:26px;color:var(--comic-red);margin:12px 0}
    .synopsis{margin-top:16px;color:#222;line-height:1.8;max-height:0;overflow:hidden;transition:max-height 1s ease}
    .synopsis
